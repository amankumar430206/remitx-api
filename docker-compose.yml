services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: remitx
      POSTGRES_USER: remitx
      POSTGRES_PASSWORD: remitx_dev
    ports:
      - "5432:5432"
    volumes:
      # Named volume — survives `docker compose down` and container recreation.
      # Only removed by `docker compose down -v` or `docker volume rm`.
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remitx -d remitx"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Enable AOF persistence so Redis data (sessions, queues, idempotency keys)
    # survives restarts instead of living only in memory.
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
